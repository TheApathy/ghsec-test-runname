name: Vector - Matrix Poisoning
on:
  workflow_dispatch:
    inputs:
      matrix_value:
        description: 'Matrix value'
        required: false
        type: string
        default: 'ubuntu-latest'
  pull_request:
    types: [opened]

jobs:
  test-matrix:
    strategy:
      matrix:
        os: [ubuntu-latest, ${{ github.event.inputs.matrix_value || 'windows-latest' }}]
        version: ["${{ github.event.pull_request.title || '1.0' }}"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Log matrix info
        run: |
          echo "=== MATRIX POISONING TEST ==="
          echo "OS: ${{ matrix.os }}"
          echo "Version: ${{ matrix.version }}"
          echo "Secret present: ${{ secrets.FAKE_SECRET != '' && 'YES' || 'NO' }}"
          echo "=============================="
